name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version, e.g. 1.2.3"
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      RELEASE_VERSION: ${{ inputs.version }}
      RELEASE_TAG: v${{ inputs.version }}
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Refuse existing tag
        run: |
          git fetch --tags
          if git rev-parse -q --verify "refs/tags/$RELEASE_TAG" >/dev/null; then
            echo "tag already exists: $RELEASE_TAG" >&2
            exit 1
          fi

      - name: Bump version
        run: python .github/scripts/bump_version.py "$RELEASE_VERSION"

      - name: Commit, tag, and release
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add pyproject.toml src/sbx/__init__.py uv.lock
          git diff --cached --quiet || git commit -m "Release $RELEASE_TAG"
          git tag "$RELEASE_TAG"
          git push origin "HEAD:$GITHUB_REF_NAME"
          git push origin "$RELEASE_TAG"
          gh release create "$RELEASE_TAG" --title "$RELEASE_TAG" --generate-notes

      - name: Update webpage
        run: |
          git clone --branch webpage/main --single-branch "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" webpage-release
          python .github/scripts/bump_webpage_version.py "$RELEASE_VERSION" webpage-release/index.html
          cd webpage-release
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --cached --quiet || git commit -m "Update website for $RELEASE_TAG"
          git push origin HEAD:webpage/main
