name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version, e.g. 1.2.3. Leave blank for next patch."
        required: false
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0

      - name: Resolve release version
        run: |
          git fetch --tags
          latest_tag="$(git tag --sort=-v:refname | head -n 1)"
          version="${{ inputs.version }}"
          version="${version#v}"
          if [ -z "$version" ]; then
            if [ -z "$latest_tag" ]; then
              version="0.1.0"
            else
              latest_version="${latest_tag#v}"
              IFS=. read -r major minor patch <<EOF
          $latest_version
          EOF
              version="$major.$minor.$((patch + 1))"
            fi
          fi
          release_tag="v$version"

          echo "Previous release: ${latest_tag:-none}"
          echo "Current release: $release_tag"
          echo "Previous release: ${latest_tag:-none}" >> "$GITHUB_STEP_SUMMARY"
          echo "Current release: $release_tag" >> "$GITHUB_STEP_SUMMARY"
          if git rev-parse -q --verify "refs/tags/$release_tag" >/dev/null; then
            echo "tag already exists: $release_tag" >&2
            exit 1
          fi
          echo "RELEASE_VERSION=$version" >> "$GITHUB_ENV"
          echo "RELEASE_TAG=$release_tag" >> "$GITHUB_ENV"

      - name: Bump version
        run: python .github/scripts/bump_version.py "$RELEASE_VERSION"

      - name: Commit, tag, and release
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add pyproject.toml src/sbx/__init__.py uv.lock
          git diff --cached --quiet || git commit -m "Release $RELEASE_TAG"
          git tag "$RELEASE_TAG"
          git push origin "HEAD:$GITHUB_REF_NAME"
          git push origin "$RELEASE_TAG"
          gh release create "$RELEASE_TAG" --title "$RELEASE_TAG" --generate-notes

      - name: Update webpage
        run: |
          git clone --branch webpage/main --single-branch "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" webpage-release
          python .github/scripts/bump_webpage_version.py "$RELEASE_VERSION" webpage-release/index.html
          cd webpage-release
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --cached --quiet || git commit -m "Update website for $RELEASE_TAG"
          git push origin HEAD:webpage/main
