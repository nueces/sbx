repos:
  - repo: local
    hooks:
      - id: ruff-check
        name: ruff check
        entry: uv run --python 3.12 --extra dev ruff check .
        language: system
        pass_filenames: false
      - id: tests
        name: tests
        entry: uv run --python 3.12 --extra dev pytest --no-cov
        language: system
        pass_filenames: false
